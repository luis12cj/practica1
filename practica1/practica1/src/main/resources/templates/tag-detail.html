<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Etiqueta <' + ${tag.name} + '>'">Detalle de Etiqueta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">

        <div class="card-body">
            <h1 class="card-title text-primary border-bottom pb-2">
                Etiqueta <span th:text="'&lt;' + ${tag.name} + '&gt;'"></span>
            </h1>

            <h4 class="mt-4">Descripción semántica</h4>
            <p class="fs-5" th:text="${tag.description}"></p>

            <ul class="list-group mb-4">
                <li class="list-group-item"><strong>Sintaxis básica:</strong> <span class="text-monospace" th:text="${tag.syntax}"></span></li>
                <li class="list-group-item"><strong>Atributos más comunes:</strong> <span th:text="${tag.attributes}"></span></li>
            </ul>

            <h4>Código de ejemplo</h4>
            <pre class="bg-dark text-light p-3 rounded"><code th:text="${tag.codeExample}"></code></pre>

            <h4 class="mt-4">Ejemplo renderizado real</h4>
            <div class="border border-primary border-2 p-4 mb-4 bg-white rounded" th:utext="${tag.codeExample}">
            </div>
        </div>

        <div class="card-footer bg-white d-flex justify-content-between p-3">
            <div>
                <a th:if="${prevTag != null}" th:href="@{/tag/{name}(name=${prevTag.name})}" class="btn btn-outline-primary btn-lg">
                    &larr; Anterior (<span th:text="${prevTag.name}"></span>)
                </a>
            </div>

            <div>
                <a th:href="@{/}" class="btn btn-secondary btn-lg">Índice</a>
            </div>

            <div>
                <a th:if="${nextTag != null}" th:href="@{/tag/{name}(name=${nextTag.name})}" class="btn btn-outline-primary btn-lg">
                    Siguiente (<span th:text="${nextTag.name}"></span>) &rarr;
                </a>
            </div>
        </div>

    </div>
</div>

</body>
</html>
