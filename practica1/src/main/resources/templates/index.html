<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etiquetas HTML</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="text-center mb-3">Etiquetas HTML</h1>

    <div class="text-center mb-4 bg-white p-3 shadow-sm rounded border">
        <h5 class="text-primary mb-2">Materia: Tecnologías para el Desarrollo de Aplicaciones Web</h5>
        <p class="mb-1 fs-5"><strong>Profesor:</strong> Efraín Arredondo Morales</p>
        <p class="mb-0 fs-5"><strong>Alumno:</strong> Luis Eduardo Carrillo Jaime</p>
    </div>

    <p class="text-center text-muted mb-4">Selecciona una etiqueta para ver su definición, sintaxis y un ejemplo en vivo.</p>

    <div class="row">
        <div class="col-md-6 mb-4" th:each="categoryEntry : ${categories}">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-dark text-white">
                    <h4 class="mb-0" th:text="${categoryEntry.key}">Categoría</h4>
                </div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item" th:each="tag : ${categoryEntry.value}">
                        <a th:href="@{/tag/{name}(name=${tag.name})}"
                           class="text-decoration-none fw-bold fs-5"
                           th:text="'&lt;' + ${tag.name} + '&gt;'">
                        </a>
                        <span class="text-muted ms-2" th:text="${tag.description}"></span>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>

</body>
</html>
